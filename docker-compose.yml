name: auto_crypto_quant

services:
  quant:
    build: .
    container_name: auto-crypto-quant
    ports:
      - "${APP_PORT:-18000}:${APP_PORT:-18000}"
    env_file:
      - .env
    environment:
      - STORAGE_DB_PATH=data/trade.db
    volumes:
      - quant_data:/app/data
    restart: unless-stopped

volumes:
  quant_data:
